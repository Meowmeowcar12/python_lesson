name: Build Mac Game

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-mac:
    # Use the latest macOS runner (this will be an M-series Apple Silicon runner)
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pygame

    - name: Build Game with PyInstaller
      run: |
        # Note the colon ":" separator for Mac instead of semicolon ";"
        pyinstaller --noconfirm --onefile --windowed --add-data "cat.png:." --add-data "fish.png:." --add-data "grass.png:." game_jumper.py

    - name: Zip the Application Bundle
      run: |
        # Mac applications are technically folders ending in .app
        # We need to zip it so it can be downloaded properly without breaking
        cd dist
        zip -r game_jumper_mac.zip game_jumper.app

    - name: Upload Mac Game
      uses: actions/upload-artifact@v4
      with:
        name: game_jumper_mac
        path: dist/game_jumper_mac.zip
